<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#050507" />
    <meta name="description" content="PixelForge — Professional unlimited collage maker with lossless quality" />
    <title>PixelForge — Collage Studio</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; background: #050507; color: #c8c8e8; }
      body { font-family: 'DM Sans', sans-serif; overflow: hidden; }
      #root { display: flex; flex-direction: column; }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0d0d12; }
      ::-webkit-scrollbar-thumb { background: #252535; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #4a4a6a; }

      /* Selection */
      ::selection { background: rgba(108,99,255,0.3); color: #eeeef8; }

      /* Loading splash */
      #splash {
        position: fixed; inset: 0; background: #050507;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .splash-logo { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
        background: linear-gradient(135deg, #6c63ff, #f5c842); -webkit-background-clip: text;
        -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.02em; }
      .splash-sub { color: #4a4a6a; font-size: 0.85rem; margin-top: 8px; letter-spacing: 0.1em; text-transform: uppercase; }
      .splash-bar { width: 120px; height: 2px; background: #12121a; border-radius: 2px; margin-top: 32px; overflow: hidden; }
      .splash-fill { height: 100%; background: linear-gradient(90deg, #6c63ff, #f5c842);
        animation: loadBar 1.2s ease-in-out forwards; border-radius: 2px; }
      @keyframes loadBar { from { width: 0% } to { width: 100% } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">PixelForge</div>
      <div class="splash-sub">Collage Studio</div>
      <div class="splash-bar"><div class="splash-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) s.classList.add('hidden');
          setTimeout(() => s && s.remove(), 400);
        }, 1400);
      });
    </script>
  </body>
</html>
